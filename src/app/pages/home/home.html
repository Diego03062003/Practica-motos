


<h1>Best motos models</h1>
<img src="/IMG/moto7.jpg" alt="Moto 5" class="moto-image">


<swiper-container slides-per-view="4" loop="true" autoplay="true" speed="500">
    @for ( producto of productos; track producto.id ) {
        <swiper-slide>
            <div class="product-card">
                <img [src]="producto.image" alt="{{ producto.name }}" class="product-image">
                <h2>{{ producto.name }}</h2>
            </div>
        </swiper-slide>
        
    }
</swiper-container>
